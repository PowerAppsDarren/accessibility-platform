services:
  db:
    image: mysql:8.0
    container_name: utmb-accessibility-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: utmb_root_pass
      MYSQL_DATABASE: utmb_accessibility
      MYSQL_USER: utmb_user
      MYSQL_PASSWORD: utmb_pass
    ports:
      - "55011:3306"
    volumes:
      - utmb-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-putmb_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - utmb-net

  app:
    build: .
    container_name: utmb-accessibility-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "mysql://utmb_user:utmb_pass@db:3306/utmb_accessibility"
      JWT_SECRET: "docker-local-dev-secret-change-me"
      VITE_APP_ID: ""
      OAUTH_SERVER_URL: ""
      OWNER_OPEN_ID: ""
    ports:
      - "55010:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - utmb-net

volumes:
  utmb-db-data:

networks:
  utmb-net:
    driver: bridge
